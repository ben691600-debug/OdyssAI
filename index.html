<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OdyssAI</title>
<meta name="theme-color" content="#0B0F2A">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  :root{
    --bg: #0B0F2A;
    --bg-elevated: #131A3F;
    --blue: #4A7DFF;
    --purple: #9B6BFF;
    --gradient: linear-gradient(135deg, var(--blue), var(--purple));
    --text: #F5F5FF;
    --text-muted: #9BA3C9;
    --border: #232A55;
    --success: #3DDC97;
    --danger: #FF6B6B;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }

  header.app-header{
    display:flex; align-items:center; gap:12px; padding:16px 20px;
    border-bottom:1px solid var(--border);
  }
  header.app-header img{ width:34px; height:34px; border-radius:9px; }
  header.app-header .brand{ font-size:19px; font-weight:700; }
  header.app-header .brand span{
    background:var(--gradient); -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  main{ padding:16px 16px 60px; max-width:560px; margin:0 auto; }

  /* Catégories */
  .chips{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:14px; }
  .chip{
    flex:0 0 auto; display:flex; align-items:center; gap:6px;
    padding:10px 16px; border-radius:20px; border:1px solid var(--border);
    background:var(--bg-elevated); color:var(--text-muted); font-size:14px; font-weight:600;
    cursor:pointer; white-space:nowrap;
  }
  .chip.active{ background:var(--gradient); color:#fff; border-color:transparent; }

  /* Budget */
  .budget-row{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .budget-row input{
    flex:1; padding:12px 14px; border-radius:12px; border:1px solid var(--border);
    background:var(--bg-elevated); color:var(--text); font-size:15px; outline:none;
  }
  .budget-row input:focus{ border-color:var(--blue); }
  .budget-row label{ font-size:13px; color:var(--text-muted); white-space:nowrap; }

  /* Carte */
  #map{
    width:100%; height:220px; border-radius:16px; overflow:hidden;
    border:1px solid var(--border); margin-bottom:14px; background:var(--bg-elevated);
  }

  /* État / permission */
  .state-box{
    border:1px dashed var(--border); border-radius:16px; padding:26px 20px; text-align:center;
    color:var(--text-muted); font-size:14px; line-height:1.6; margin-bottom:14px;
  }
  .state-box button{
    margin-top:14px; padding:12px 22px; border:none; border-radius:12px;
    background:var(--gradient); color:#fff; font-size:14px; font-weight:600; cursor:pointer;
  }

  /* Conseil IA */
  .advice-card{
    border-radius:16px; padding:16px; margin-bottom:16px;
    background:linear-gradient(135deg, rgba(74,125,255,.14), rgba(155,107,255,.14));
    border:1px solid rgba(155,107,255,.3);
  }
  .advice-card .advice-label{
    font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--purple);
    font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:6px;
  }
  .advice-card p{ margin:0; font-size:14px; line-height:1.55; color:var(--text); }

  /* Liste des lieux */
  h2.section-title{ font-size:15px; color:var(--text-muted); margin:0 0 10px; font-weight:600; }
  .place-list{ display:flex; flex-direction:column; gap:10px; }
  .place-card{
    display:flex; gap:12px; align-items:center; padding:12px; border-radius:14px;
    background:var(--bg-elevated); border:1px solid var(--border);
  }
  .place-thumb{
    width:56px; height:56px; border-radius:12px; flex:0 0 56px;
    display:flex; align-items:center; justify-content:center; font-size:24px;
    background:var(--gradient);
  }
  .place-info{ flex:1; min-width:0; }
  .place-name{ font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .place-meta{ font-size:12.5px; color:var(--text-muted); margin-top:2px; }
  .place-best{
    font-size:10px; font-weight:700; color:var(--success); text-transform:uppercase;
    letter-spacing:.5px; margin-top:2px;
  }

  .sync-banner{
    position:fixed; top:0; left:0; right:0; padding:8px; text-align:center; font-size:12px;
    background:var(--bg-elevated); color:var(--text-muted); border-bottom:1px solid var(--border);
    transform:translateY(-100%); transition:transform .3s; z-index:50;
  }
  .sync-banner.show{ transform:translateY(0); }
  .sync-banner.ok{ color:var(--success); }
  .sync-banner.err{ color:var(--danger); }

  /* ---- Splash screen : image plein écran, fondu lent ---- */
  #splashScreen{
    position:fixed; inset:0; z-index:999;
    background-color:#0B0F2A;
    background-image:url('./icons/splash-logo.png');
    background-size:cover;
    background-position:center 42%;
    background-repeat:no-repeat;
    opacity:0;
    animation:splashFadeIn 4s ease forwards;
  }
  @keyframes splashFadeIn{ to{ opacity:1; } }
  /* Bouton Activités */
  .activity-btn{
    width:100%; display:flex; align-items:center; gap:10px; text-align:left;
    padding:14px 16px; border-radius:14px; border:1px solid var(--border);
    background:var(--bg-elevated); color:var(--text); font-size:15px; font-weight:600;
    cursor:pointer; margin-bottom:14px;
  }
  .activity-btn .icon{ font-size:20px; }
  .activity-btn .chevron{ margin-left:auto; color:var(--text-muted); }

  /* Modal choix d'activité */
  .modal-overlay{
    position:fixed; inset:0; z-index:200; background:rgba(6,8,24,.6);
    display:flex; align-items:flex-end;
  }
  .modal-sheet{
    width:100%; max-height:75vh; overflow-y:auto;
    background:var(--bg-elevated); border-radius:20px 20px 0 0; padding:18px 16px 28px;
  }
  .modal-header{
    display:flex; align-items:center; justify-content:space-between;
    font-size:16px; font-weight:700; margin-bottom:14px;
  }
  .modal-close{ color:var(--text-muted); font-size:18px; cursor:pointer; padding:4px 8px; }
  .modal-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-item{
    display:flex; align-items:center; gap:10px; padding:14px; border-radius:14px;
    background:rgba(255,255,255,.03); border:1px solid var(--border);
    color:var(--text); font-size:14px; font-weight:600; cursor:pointer;
  }
  .modal-item.active{ background:var(--gradient); border-color:transparent; }
  .modal-item .icon{ font-size:20px; }
</style>
</head>
<body>

<div id="splashScreen"></div>

<div id="syncBanner" class="sync-banner"></div>

<header class="app-header">
  <img src="./icons/icon-192.png" alt="OdyssAI">
  <div class="brand">Odyss<span>AI</span></div>
</header>

<main>
  <button class="activity-btn" onclick="openActivityModal()">
    <span class="icon" id="activityBtnIcon">🍽️</span>
    <span id="activityBtnLabel">Restaurants</span>
    <span class="chevron">▾</span>
  </button>

  <div id="activityModal" class="modal-overlay" style="display:none;" onclick="if(event.target===this) closeActivityModal()">
    <div class="modal-sheet">
      <div class="modal-header">
        Que cherchez-vous ?
        <span class="modal-close" onclick="closeActivityModal()">✕</span>
      </div>
      <div class="modal-grid" id="modalGrid"></div>
    </div>
  </div>

  <div class="budget-row">
    <label for="budgetInput">Budget max</label>
    <input id="budgetInput" type="number" inputmode="numeric" placeholder="€ (optionnel)">
  </div>

  <div id="locationState" class="state-box">
    📍 On a besoin de votre position pour vous montrer ce qu'il y a autour de vous.
    <br><button id="btnLocate" onclick="requestLocation()">Activer ma position</button>
  </div>

  <div id="map" style="display:none;"></div>

  <div id="adviceCard" class="advice-card" style="display:none;">
    <div class="advice-label">✨ Conseil</div>
    <p id="adviceText">—</p>
  </div>

  <div id="listSection" style="display:none;">
    <h2 class="section-title">À proximité</h2>
    <div id="placeList" class="place-list"></div>
  </div>
</main>

<!-- Leaflet (carte) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase (SDK compat, chargé via balise script — pas besoin de npm) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>

<script>
const APP_VERSION = "0.2.0";

// ---- Config Firebase (projet "odyssai") ----
const firebaseConfig = {
  apiKey: "AIzaSyAdsrmChs1yCA1_JfJwi7TeaPyQgCDJ9vY",
  authDomain: "odyssai-b89c3.firebaseapp.com",
  projectId: "odyssai-b89c3",
  storageBucket: "odyssai-b89c3.firebasestorage.app",
  messagingSenderId: "788740828893",
  appId: "1:788740828893:web:dd3a095e47798bfc09b534"
};

let _rtdb = null;
let _firebaseAuthReady = false;
let map = null;
let userMarker = null;
let placeMarkers = [];
let userLat = null, userLng = null;
let currentCategory = 'restaurant';

const CATEGORY_CONFIG = {
  restaurant: { icon:'🍽️', label:'Restaurants', radius:1500, query:'node["amenity"="restaurant"]' },
  cafe:       { icon:'☕', label:'Cafés',        radius:1200, query:'node["amenity"="cafe"]' },
  bar:        { icon:'🍸', label:'Bars',         radius:1500, query:'node["amenity"="bar"]' },
  randonnee:  { icon:'🥾', label:'Randonnées',   radius:8000, query:'node["tourism"="viewpoint"];node["natural"="peak"]' },
  balade:     { icon:'🚶', label:'Balades',      radius:2500, query:'node["leisure"="park"];node["tourism"="attraction"]' },
  piscine:    { icon:'🏊', label:'Piscines',     radius:6000, query:'node["leisure"="swimming_pool"];node["leisure"="water_park"]' },
  plage:      { icon:'🏖️', label:'Plages',       radius:20000, query:'node["natural"="beach"]' },
  musee:      { icon:'🖼️', label:'Musées',       radius:6000, query:'node["tourism"="museum"]' },
  sport:      { icon:'⚽', label:'Sport',        radius:5000, query:'node["leisure"="sports_centre"]' },
  shopping:   { icon:'🛍️', label:'Shopping',     radius:4000, query:'node["shop"="mall"];node["shop"="department_store"]' }
};

function showSyncBanner(text, type){
  const el = document.getElementById('syncBanner');
  el.textContent = text;
  el.className = 'sync-banner show' + (type ? ' ' + type : '');
  if(type === 'ok'){ setTimeout(() => { el.classList.remove('show'); }, 2000); }
}

function initFirebaseSecurity(){
  firebase.initializeApp(firebaseConfig);
  firebase.auth().signInAnonymously().then(() => {
    _firebaseAuthReady = true;
    _rtdb = firebase.database();
    loadLastPrefs();
  }).catch((err) => {
    console.error("Auth error:", err);
  });
}

function loadLastPrefs(){
  if(!_rtdb) return;
  _rtdb.ref('prefs/lastCategory').once('value').then((snap) => {
    const val = snap.val();
    if(val && CATEGORY_CONFIG[val]) selectCategory(val, false);
  });
  _rtdb.ref('prefs/lastBudget').once('value').then((snap) => {
    const val = snap.val();
    if(val) document.getElementById('budgetInput').value = val;
  });
}

function savePrefs(){
  if(!_rtdb) return;
  _rtdb.ref('prefs/lastCategory').set(currentCategory);
  _rtdb.ref('prefs/lastBudget').set(Number(document.getElementById('budgetInput').value) || null);
}

// ---- Géolocalisation ----
function requestLocation(){
  if(!navigator.geolocation){
    document.getElementById('locationState').innerHTML = "❌ Votre navigateur ne supporte pas la géolocalisation.";
    return;
  }
  document.getElementById('locationState').innerHTML = "📍 Recherche de votre position...";
  navigator.geolocation.getCurrentPosition(onLocationSuccess, onLocationError, {
    enableHighAccuracy:true, timeout:12000, maximumAge:60000
  });
}

function onLocationError(err){
  console.error(err);
  document.getElementById('locationState').innerHTML =
    "⚠️ Impossible d'accéder à votre position (" + (err.message || "erreur") + ").<br>" +
    "Vérifiez que la localisation est autorisée pour ce site.<br>" +
    '<button onclick="requestLocation()">Réessayer</button>';
}

function onLocationSuccess(pos){
  userLat = pos.coords.latitude;
  userLng = pos.coords.longitude;
  document.getElementById('locationState').style.display = 'none';
  document.getElementById('map').style.display = 'block';
  initMap();
  fetchNearbyPlaces();
}

function initMap(){
  if(map) { map.setView([userLat, userLng], 14); updateUserMarker(); return; }
  map = L.map('map', { zoomControl:false }).setView([userLat, userLng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap'
  }).addTo(map);
  updateUserMarker();
}

function updateUserMarker(){
  if(userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker([userLat, userLng], {
    radius:8, color:'#4A7DFF', fillColor:'#4A7DFF', fillOpacity:1, weight:3
  }).addTo(map);
}

// ---- Menu Activités ----
function buildActivityModal(){
  const grid = document.getElementById('modalGrid');
  grid.innerHTML = Object.entries(CATEGORY_CONFIG).map(([key, cfg]) => `
    <div class="modal-item${key===currentCategory?' active':''}" data-cat="${key}" onclick="selectCategory('${key}', true); closeActivityModal();">
      <span class="icon">${cfg.icon}</span><span>${cfg.label}</span>
    </div>
  `).join('');
}

function openActivityModal(){
  buildActivityModal();
  document.getElementById('activityModal').style.display = 'flex';
}

function closeActivityModal(){
  document.getElementById('activityModal').style.display = 'none';
}

function selectCategory(cat, refetch){
  currentCategory = cat;
  const cfg = CATEGORY_CONFIG[cat];
  document.getElementById('activityBtnIcon').textContent = cfg.icon;
  document.getElementById('activityBtnLabel').textContent = cfg.label;
  if(refetch && userLat){ fetchNearbyPlaces(); savePrefs(); }
}

document.getElementById('budgetInput').addEventListener('change', () => {
  savePrefs();
  renderAdvice(window._lastPlaces || []);
});

// ---- Overpass : lieux à proximité ----
function haversine(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = (d) => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fetchNearbyPlaces(){
  const cfg = CATEGORY_CONFIG[currentCategory];
  document.getElementById('listSection').style.display = 'block';
  document.getElementById('placeList').innerHTML = '<div class="state-box">Recherche des lieux à proximité...</div>';

  const parts = cfg.query.split(';').filter(Boolean).map(q => `${q}(around:${cfg.radius},${userLat},${userLng});`).join('');
  const overpassQuery = `[out:json][timeout:25];(${parts});out body 40;`;

  fetch('https://overpass-api.de/api/interpreter', {
    method:'POST',
    body:'data=' + encodeURIComponent(overpassQuery)
  })
  .then(r => r.json())
  .then(data => {
    const places = (data.elements || [])
      .filter(el => el.tags && el.tags.name)
      .map(el => ({
        name: el.tags.name,
        lat: el.lat, lng: el.lon,
        distance: haversine(userLat, userLng, el.lat, el.lon)
      }))
      .sort((a,b) => a.distance - b.distance)
      .slice(0, 15);

    window._lastPlaces = places;
    renderMarkers(places);
    renderPlaceList(places);
    renderAdvice(places);
  })
  .catch(err => {
    console.error(err);
    document.getElementById('placeList').innerHTML =
      '<div class="state-box">⚠️ Impossible de charger les lieux à proximité. Vérifiez votre connexion et réessayez.</div>';
  });
}

function renderMarkers(places){
  placeMarkers.forEach(m => map.removeLayer(m));
  placeMarkers = [];
  places.forEach(p => {
    const marker = L.marker([p.lat, p.lng]).addTo(map).bindPopup(p.name);
    placeMarkers.push(marker);
  });
}

function renderPlaceList(places){
  const cfg = CATEGORY_CONFIG[currentCategory];
  const container = document.getElementById('placeList');
  if(places.length === 0){
    container.innerHTML = '<div class="state-box">Rien trouvé à proximité pour cette catégorie. Essayez-en une autre.</div>';
    return;
  }
  container.innerHTML = places.map((p, i) => `
    <div class="place-card">
      <div class="place-thumb">${cfg.icon}</div>
      <div class="place-info">
        <div class="place-name">${escapeHtml(p.name)}</div>
        <div class="place-meta">${formatDistance(p.distance)} · ${cfg.label}</div>
        ${i === 0 ? '<div class="place-best">Le plus proche</div>' : ''}
      </div>
    </div>
  `).join('');
}

function renderAdvice(places){
  const cfg = CATEGORY_CONFIG[currentCategory];
  const budget = Number(document.getElementById('budgetInput').value) || 0;
  const card = document.getElementById('adviceCard');
  const text = document.getElementById('adviceText');

  if(!places || places.length === 0){
    card.style.display = 'none';
    return;
  }
  card.style.display = 'block';
  const top = places[0];
  let msg = `${places.length} ${cfg.label.toLowerCase()}${places.length>1?'s':''} trouvé${places.length>1?'s':''} près de vous. ` +
            `Le plus proche est "${top.name}", à ${formatDistance(top.distance)}.`;
  if(budget > 0){
    msg += ` Avec un budget de ${budget} €, vous devriez avoir de quoi couvrir la plupart des options à proximité.`;
  }
  text.textContent = msg;
}

function formatDistance(m){
  return m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(1) + ' km';
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---- Service worker (mise à jour manuelle uniquement, jamais automatique) ----
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}

function hideSplash(){
  const splash = document.getElementById('splashScreen');
  if(!splash) return;
  splash.style.display = 'none'; // coupure nette, aucun fondu à la sortie
}

const SPLASH_MIN_MS = 10000;
const splashStart = Date.now();
let appReady = false;

function trySplashDismiss(){
  appReady = true;
  const elapsed = Date.now() - splashStart;
  const wait = Math.max(0, SPLASH_MIN_MS - elapsed);
  setTimeout(hideSplash, wait);
}

setTimeout(() => { if(!appReady) hideSplash(); }, 10500);
document.getElementById('splashScreen').addEventListener('click', hideSplash);

initFirebaseSecurity();
setTimeout(trySplashDismiss, 800); // l'app (chips/carte) est utilisable très vite, indépendamment de Firebase
</script>
</body>
</html>
